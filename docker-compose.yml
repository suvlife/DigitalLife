# 数字人生 Docker Compose
# 快速启动数字人生服务

version: "3.8"

services:
  digitallife:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "0.8.3"
    image: digitallife:0.8.3
    container_name: digitallife
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 持久化数据目录
      - digitallife-storage:/storage
      # 可选：挂载自定义配置文件
      # - ./setting.json:/storage/setting.json:ro
    environment:
      # Docker 需要监听容器网卡；公网部署必须在反向代理层启用鉴权。
      - BIND_HOST=0.0.0.0
      - BIND_PORT=8080
      # Ghost 等密钥建议通过部署平台 Secret 或 .env 注入，不写入镜像。
      # - GHOST_ENABLED=true
      # - GHOST_API_URL=https://your-blog.example
      # - GHOST_ADMIN_API_KEY=${GHOST_ADMIN_API_KEY}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/system/status.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  digitallife-storage:
    name: digitallife-storage