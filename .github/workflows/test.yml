name: Tests

on:
  push:
    branches:
      - '**'  # 所有分支 push，排除 tag
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-timeout pytest-xdist

    - name: Run mypy
      run: |
        bash scripts/run_mypy.sh

    - name: Run tests with coverage (parallel)
      run: |
        PYTHONPATH=src python -m pytest tests/unit tests/api tests/integration -n auto --dist loadscope --timeout=60 \
          --cov=src --cov-report=term-missing --cov-fail-under=60

    - name: Run real tests
      run: |
        PYTHONPATH=src python -m pytest tests/real/ -v --timeout=30

    - name: Run pip-audit (dependency vulnerability scan)
      run: |
        pip install pip-audit
        pip-audit --strict -r requirements.txt
      continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          frontend-v2/package-lock.json

    - name: Install frontend dependencies
      run: |
        npm ci --prefix frontend
        npm ci --prefix frontend-v2

    - name: Test and build classic frontend
      working-directory: frontend
      run: |
        npm run test:run
        npm run build

    - name: Test and build V2 frontend
      working-directory: frontend-v2
      run: |
        npm run test:run
        npm run build
