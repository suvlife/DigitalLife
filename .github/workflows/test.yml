name: Tests

on:
  push:
    branches:
      - '**'  # 所有分支 push，排除 tag
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-timeout pytest-xdist

    - name: Run tests with coverage (parallel)
      run: |
        PYTHONPATH=src python -m pytest tests/unit tests/api tests/integration -n 1 --dist loadscope --timeout=60 \
          --cov=src --cov-report=term-missing --cov-fail-under=60

    - name: Run mypy with legacy-debt baseline
      id: mypy
      shell: bash
      run: |
        set +e
        bash scripts/run_mypy.sh 2>&1 | tee mypy-output.txt
        mypy_exit=${PIPESTATUS[0]}
        set -e

        error_count=$(sed -nE 's/^Found ([0-9]+) errors?.*/\1/p' mypy-output.txt | tail -1)
        if [ -z "$error_count" ]; then
          echo "mypy did not emit a parseable result" >&2
          exit 1
        fi

        # The repository has documented legacy typing debt.  CI keeps that debt
        # visible and fails on any regression instead of hiding mypy entirely.
        baseline=281
        echo "mypy_error_count=$error_count" >> "$GITHUB_OUTPUT"
        echo "mypy_exit=$mypy_exit" >> "$GITHUB_OUTPUT"
        if [ "$error_count" -gt "$baseline" ]; then
          echo "mypy regression: $error_count errors exceeds baseline $baseline" >&2
          exit 1
        fi
        echo "mypy debt is at or below baseline: $error_count <= $baseline"

    - name: Upload mypy report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mypy-python-${{ matrix.python-version }}
        path: mypy-output.txt
        if-no-files-found: ignore

    - name: Run real tests
      run: |
        PYTHONPATH=src python -m pytest tests/real/ -v --timeout=30

    - name: Run pip-audit dependency gate
      if: matrix.python-version == '3.11'
      run: |
        pip install pip-audit
        set +e
        pip-audit --strict --progress-spinner off --format json --output pip-audit.json -r requirements.txt
        audit_exit=$?
        set -e
        python scripts/check_pip_audit.py pip-audit.json
        exit "$audit_exit"

    - name: Upload pip-audit report
      if: always() && matrix.python-version == '3.11'
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-python-3.11
        path: pip-audit.json
        if-no-files-found: ignore

    - name: Scan tracked files for secrets and sensitive logs
      if: matrix.python-version == '3.11'
      run: python scripts/security_scan.py

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          frontend-v2/package-lock.json
          frontend-v3/package-lock.json

    - name: Install frontend dependencies
      run: |
        npm ci --prefix frontend
        npm ci --prefix frontend-v2
        npm ci --prefix frontend-v3

    - name: Audit production npm dependencies
      shell: bash
      run: |
        set +e
        npm audit --registry=https://registry.npmjs.org --prefix frontend --omit=dev --audit-level=high --json > npm-audit-classic.json
        classic_exit=$?
        npm audit --registry=https://registry.npmjs.org --prefix frontend-v2 --omit=dev --audit-level=high --json > npm-audit-v2.json
        v2_exit=$?
        npm audit --registry=https://registry.npmjs.org --prefix frontend-v3 --omit=dev --audit-level=high --json > npm-audit-v3.json
        v3_exit=$?
        set -e
        node scripts/check-npm-audit.mjs npm-audit-classic.json npm-audit-v2.json npm-audit-v3.json
        test "$classic_exit" -eq 0
        test "$v2_exit" -eq 0
        test "$v3_exit" -eq 0

    - name: Upload npm audit reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: npm-production-audit
        path: npm-audit-*.json
        if-no-files-found: error

    - name: Test and build classic frontend
      working-directory: frontend
      run: |
        npm run test:run
        npm run build

    - name: Test and build V2 frontend
      working-directory: frontend-v2
      run: |
        npm run test:run
        npm run build

    - name: Test and build V3 frontend
      working-directory: frontend-v3
      run: |
        npm run test:run
        npm run build

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          frontend-v2/package-lock.json
          frontend-v3/package-lock.json
          tests/e2e/package-lock.json

    - name: Install and build frontends
      run: |
        npm ci --prefix frontend
        npm ci --prefix frontend-v2
        npm ci --prefix frontend-v3
        python scripts/build_frontend.py

    - name: Install browser test dependencies
      run: |
        npm ci --prefix tests/e2e
        npx --prefix tests/e2e playwright install --with-deps chromium

    - name: Run browser user journeys
      run: npm test --prefix tests/e2e

    - name: Upload browser test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: browser-e2e-report
        path: tests/e2e/playwright-report
        if-no-files-found: ignore
