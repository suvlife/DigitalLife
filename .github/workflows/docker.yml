name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., 0.1.20, latest)'
        required: true
        default: 'latest'
        type: string
      push:
        description: 'Push image to registry'
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: true

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION="${{ inputs.tag }}"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Verify tag matches repository version
      if: github.event_name == 'push'
      run: |
        test "${{ steps.version.outputs.version }}" = "$(cat VERSION)"
        python scripts/check_version_consistency.py

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      if: ${{ github.event_name == 'push' || inputs.push }}
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine image tags
      id: image-tags
      shell: bash
      run: |
        set -euo pipefail
        ARCH="${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}"
        VERSION="${{ steps.version.outputs.version }}"
        {
          echo 'tags<<EOF'
          echo "ghcr.io/${{ github.repository_owner }}/digitallife:${VERSION}-${ARCH}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.push }}" = "true" ]; then
            test -n "${{ secrets.DOCKERHUB_USERNAME }}"
            echo "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/digitallife:${VERSION}-${ARCH}"
          fi
          echo EOF
        } >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: ${{ github.event_name == 'push' || inputs.push }}
        load: ${{ github.event_name == 'workflow_dispatch' && !inputs.push }}
        tags: ${{ steps.image-tags.outputs.tags }}
        platforms: ${{ matrix.platform }}
        provenance: false
        build-args: |
          APP_VERSION=${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Smoke-test built container
      shell: bash
      run: |
        set -euo pipefail
        IMAGE=$(printf '%s\n' "${{ steps.image-tags.outputs.tags }}" | head -1)
        if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.push }}" = "true" ]; then
          docker pull "$IMAGE"
        fi
        cid=$(docker run -d \
          -e BIND_HOST=0.0.0.0 \
          -e BIND_PORT=8080 \
          -p 127.0.0.1::8080 \
          "$IMAGE")
        trap 'docker logs "$cid" || true; docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
        host_port=$(docker port "$cid" 8080/tcp | awk -F: '{print $NF}')
        for attempt in $(seq 1 60); do
          if curl -fsS "http://127.0.0.1:${host_port}/system/status.json" > /tmp/status.json; then
            python -c 'import json; status=json.load(open("/tmp/status.json")); expected=open("VERSION").read().strip(); assert status["version"] == expected, status; assert status["initialized"] in (True, False), status; print(status)'
            exit 0
          fi
          sleep 1
        done
        echo 'Container did not become healthy within 60 seconds' >&2
        exit 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'push' || inputs.push }}

    steps:
    - name: Log in to Docker Hub
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push manifest (Docker Hub)
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.push }}
      run: |
        VERSION="${{ needs.build.outputs.version }}"
        DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

        # Create and push version manifest
        docker manifest create docker.io/${DOCKER_USERNAME}/digitallife:${VERSION} \
          docker.io/${DOCKER_USERNAME}/digitallife:${VERSION}-amd64 \
          docker.io/${DOCKER_USERNAME}/digitallife:${VERSION}-arm64
        docker manifest push docker.io/${DOCKER_USERNAME}/digitallife:${VERSION}

        # Create and push latest manifest
        docker manifest create docker.io/${DOCKER_USERNAME}/digitallife:latest \
          docker.io/${DOCKER_USERNAME}/digitallife:${VERSION}-amd64 \
          docker.io/${DOCKER_USERNAME}/digitallife:${VERSION}-arm64
        docker manifest push docker.io/${DOCKER_USERNAME}/digitallife:latest

    - name: Create and push manifest (GitHub Registry)
      run: |
        VERSION="${{ needs.build.outputs.version }}"
        GH_REPO="${{ github.repository_owner }}"

        # Create and push version manifest
        docker manifest create ghcr.io/${GH_REPO}/digitallife:${VERSION} \
          ghcr.io/${GH_REPO}/digitallife:${VERSION}-amd64 \
          ghcr.io/${GH_REPO}/digitallife:${VERSION}-arm64
        docker manifest push ghcr.io/${GH_REPO}/digitallife:${VERSION}

        # Create and push latest manifest
        docker manifest create ghcr.io/${GH_REPO}/digitallife:latest \
          ghcr.io/${GH_REPO}/digitallife:${VERSION}-amd64 \
          ghcr.io/${GH_REPO}/digitallife:${VERSION}-arm64
        docker manifest push ghcr.io/${GH_REPO}/digitallife:latest

    - name: Summary
      run: |
        VERSION="${{ needs.build.outputs.version }}"
        echo "### Docker Multi-arch Manifest Created" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "- **Registries**: Docker Hub, GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
        echo "- **Architectures**: amd64 (ubuntu-latest), arm64 (ubuntu-24.04-arm)" >> $GITHUB_STEP_SUMMARY