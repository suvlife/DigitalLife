name: Release macOS & Linux App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v-prefixed tag to build (for example v0.6.1)
        required: true
        type: string

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest

    env:
      TARGET_ARCH: ${{ matrix.arch }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      # Apple 证书（用于签名）
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      # Apple 公证凭证
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}
        submodules: recursive
        lfs: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # ── x86_64: 通过 Rosetta 2 + uv 跨平台安装 x86_64 依赖 ──
    - name: Set up x86_64 venv via Rosetta 2
      if: matrix.arch == 'x86_64'
      run: |
        echo "🔧 Setting up x86_64 Python via Rosetta 2 + uv..."

        # 验证 setup-python 安装的 Python 是 universal binary
        PYTHON_BIN=$(which python3)
        echo "Python: $PYTHON_BIN"
        lipo -info "$PYTHON_BIN"

        # 用 arch -x86_64 创建 x86_64 虚拟环境
        arch -x86_64 python3 -m venv "$RUNNER_TEMP/x86_64-venv"
        VENV="$RUNNER_TEMP/x86_64-venv"

        # 将 venv 中的 universal Python 替换为纯 x86_64 binary
        # 这样 sys.executable 和所有子进程都会以 x86_64 模式运行
        # cp 跟随 symlink，直接复制 universal binary
        echo "Before lipo:"
        lipo -info "$VENV/bin/python3"
        cp "$VENV/bin/python3" /tmp/python3_universal
        lipo -thin x86_64 /tmp/python3_universal -output /tmp/python3_x86_64
        rm "$VENV/bin/python3"
        mv /tmp/python3_x86_64 "$VENV/bin/python3"
        chmod +x "$VENV/bin/python3"
        # 同时替换 python（无后缀），确保所有调用路径都是 x86_64
        if [ -L "$VENV/bin/python" ] || [ -f "$VENV/bin/python" ]; then
          rm "$VENV/bin/python"
          cp "$VENV/bin/python3" "$VENV/bin/python"
          chmod +x "$VENV/bin/python"
        fi
        echo "After lipo (x86_64-only):"
        lipo -info "$VENV/bin/python3"
        lipo -info "$VENV/bin/python"
        # 验证架构
        "$VENV/bin/python3" -c "import platform; print(f'Venv Python3 Arch: {platform.machine()}')"
        "$VENV/bin/python" -c "import platform; print(f'Venv Python Arch: {platform.machine()}')"

        # 安装 uv（快速包管理器，原生支持 --python-platform 跨平台安装）
        curl -LsSf https://astral.sh/uv/install.sh | sh
        UV="$HOME/.local/bin/uv"

        # 使用 uv 一键安装所有依赖（自动处理 wheel/sdist 回退）
        # --python-platform x86_64-apple-darwin：下载 x86_64 wheel，无则从源码编译
        # --python-version 3.11：指定目标 Python 版本
        # --python：指定目标 Python 解释器（x86_64 venv）
        "$UV" pip install \
          --python "$VENV/bin/python3" \
          --python-version 3.11 \
          --python-platform x86_64-apple-darwin \
          -r requirements.txt

        "$UV" pip install \
          --python "$VENV/bin/python3" \
          --python-version 3.11 \
          --python-platform x86_64-apple-darwin \
          pyinstaller

        # 验证架构
        echo "=== Architecture verification ==="
        "$VENV/bin/python" --version
        "$VENV/bin/python" -c "import platform; print(f'Arch: {platform.machine()}')"
        SITE_PACKAGES=$("$VENV/bin/python" -c "import site; print(site.getsitepackages()[0])")
        # 验证 Pillow 是否为 x86_64
        "$VENV/bin/python" -c "
        from PIL import features
        print(f'Pillow features: {features.check(\"avif\")}')
        " 2>&1 || true
        # 直接检查 .so 文件架构
        PIL_SO=$(find "$SITE_PACKAGES" -name "_avif*.so" -o -name "_imaging*.so" 2>/dev/null | head -1)
        if [ -n "$PIL_SO" ]; then
          echo "PIL .so: $PIL_SO"
          lipo -info "$PIL_SO" || true
        fi

        # 将 x86_64 venv 加入 PATH（后续步骤自动使用）
        echo "$VENV/bin" >> $GITHUB_PATH
        echo "✅ x86_64 Python environment ready"

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Verify tag matches repository version
      run: |
        VERSION=$(cat VERSION)
        test "${RELEASE_TAG}" = "v${VERSION}"
        python scripts/check_version_consistency.py

    - name: Cache pip dependencies
      if: matrix.arch == 'arm64'
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-release-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-release-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies (arm64)
      if: matrix.arch == 'arm64'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install frontend dependencies
      run: |
        npm ci --prefix frontend
        npm ci --prefix frontend-v2

    - name: Import Apple certificate
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      env:
        KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      run: |
        # 创建临时 keychain
        security create-keychain -p tempkey "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p tempkey "$KEYCHAIN_PATH"

        # 导入证书
        CERT_PATH="$RUNNER_TEMP/cert.p12"
        printf '%s' "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

        if [ ! -s "$CERT_PATH" ]; then
          echo "❌ Certificate file is empty or decode failed"
          exit 1
        fi

        security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k tempkey "$KEYCHAIN_PATH"

        # 设为默认 keychain（codesign 无需 --keychain 参数）
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"

        rm "$CERT_PATH"
        echo "✅ Certificate imported"

    - name: Generate build config
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      run: |
        cat > scripts/build_config.json << EOF
        {
          "apple_id": "$APPLE_ID",
          "app_specific_password": "$APPLE_APP_PASSWORD",
          "team_id": "$APPLE_TEAM_ID",
          "signing_identity_hash": "$APPLE_SIGNING_IDENTITY"
        }
        EOF

    - name: Build and release
      run: |
        echo "=== Python environment ==="
        # x86_64 构建必须使用 venv 中的 x86_64 python
        if [ "${{ matrix.arch }}" = "x86_64" ]; then
          PYTHON="$RUNNER_TEMP/x86_64-venv/bin/python"
        else
          PYTHON="$(which python)"
        fi
        echo "Using: $PYTHON"
        $PYTHON --version
        $PYTHON -c "import platform; print(f'Arch: {platform.machine()}')"
        $PYTHON -c "import sysconfig; print(f'Platform: {sysconfig.get_platform()}')"
        echo "========================="

        if [ -f scripts/build_config.json ]; then
          $PYTHON scripts/build_release.py --arch ${{ matrix.arch }}
        else
          echo "⚠️ Apple Developer ID / notarization secrets are not configured."
          echo "Building the documented ad-hoc signed community package instead."
          TARGET_ARCH=${{ matrix.arch }} $PYTHON scripts/build_mac.py
        fi

    - name: Package and verify release assets
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${RELEASE_TAG#v}"
        ASSET_NAME="digitallife-${VERSION}-macos-${{ matrix.arch }}.zip"
        ZIP_PATH="dist/${ASSET_NAME}"
        PACKAGE_DIR="dist/digitallife-${VERSION}-macos-${{ matrix.arch }}"

        # Always create the final named archive here.  The checksum is generated
        # only after this archive is final, so a stale sidecar cannot survive.
        rm -rf "$PACKAGE_DIR" "$ZIP_PATH" "${ZIP_PATH}.sha256"
        APP_PATH=$(find dist -maxdepth 1 -type d \( -name 'DigitalLife-*.app' -o -name 'DigitalLife.app' \) | head -1)
        test -n "$APP_PATH"
        mkdir -p "$PACKAGE_DIR"
        ditto "$APP_PATH" "$PACKAGE_DIR/DigitalLife.app"
        cp scripts/macos-installer/安装数字人生.command scripts/macos-installer/README.txt "$PACKAGE_DIR/"
        ditto -c -k --keepParent "$PACKAGE_DIR" "$ZIP_PATH"
        test -s "$ZIP_PATH"

        VERIFY_DIR=$(mktemp -d)
        trap 'rm -rf "$VERIFY_DIR"' EXIT
        ditto -x -k "$ZIP_PATH" "$VERIFY_DIR"
        EXTRACTED_APP=$(find "$VERIFY_DIR" -type d -name DigitalLife.app -print -quit)
        test -n "$EXTRACTED_APP"
        codesign --verify --deep --strict --verbose=2 "$EXTRACTED_APP"
        test -x "$(find "$VERIFY_DIR" -name '安装数字人生.command' -print -quit)"
        if [ -n "$APPLE_CERTIFICATE_P12" ]; then
          # Developer-ID builds must also carry a valid notarization ticket and
          # pass Gatekeeper before any release asset is uploaded.
          xcrun stapler validate "$EXTRACTED_APP"
          spctl --assess --type execute --verbose=2 "$EXTRACTED_APP"
        fi

        (cd dist && shasum -a 256 "$ASSET_NAME" > "${ASSET_NAME}.sha256")
        (cd dist && shasum -a 256 -c "${ASSET_NAME}.sha256")
        echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
        echo "SHA_PATH=${ZIP_PATH}.sha256" >> "$GITHUB_ENV"
        echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

    - name: Refuse to overwrite existing release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail
        existing=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' 2>/dev/null || true)
        if printf '%s\n' "$existing" | grep -Fxq "$ASSET_NAME" || \
           printf '%s\n' "$existing" | grep -Fxq "${ASSET_NAME}.sha256"; then
          echo "Release assets already exist for $RELEASE_TAG; refusing a partial or inconsistent overwrite." >&2
          exit 1
        fi

    - name: Create GitHub Release with paired assets
      uses: softprops/action-gh-release@v3
      with:
        name: "digitallife ${{ env.RELEASE_TAG }}"
        tag_name: ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: true
        overwrite_files: false
        files: |
          ${{ env.ZIP_PATH }}
          ${{ env.SHA_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ env.RELEASE_TAG }}
        submodules: recursive
        lfs: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Verify tag matches repository version
      shell: bash
      run: |
        set -euo pipefail
        test "${RELEASE_TAG#v}" = "$(cat VERSION)"
        python scripts/check_version_consistency.py

    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends dpkg-dev file wget fuse

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build frontends
      run: python scripts/build_frontend.py --install

    - name: Build Linux app (PyInstaller onedir)
      run: pyinstaller --clean --noconfirm scripts/digital_life_linux.spec

    - name: Package .deb and AppImage
      run: bash scripts/package_linux.sh "${RELEASE_TAG#v}" "${{ matrix.arch }}"

    - name: Collect release assets
      id: assets
      shell: bash
      run: |
        set -euo pipefail
        VERSION="${RELEASE_TAG#v}"
        {
          echo "files<<EOF"
          for f in \
            "dist/digitallife-${VERSION}-linux-${{ matrix.arch }}.deb" \
            "dist/digitallife-${VERSION}-linux-${{ matrix.arch }}.deb.sha256" \
            "dist/digitallife-${VERSION}-linux-${{ matrix.arch }}.AppImage" \
            "dist/digitallife-${VERSION}-linux-${{ matrix.arch }}.AppImage.sha256"; do
            [ -f "$f" ] && echo "$f"
          done
          echo EOF
        } >> "$GITHUB_OUTPUT"

    - name: Attach Linux assets to release
      uses: softprops/action-gh-release@v3
      with:
        name: "digitallife ${{ env.RELEASE_TAG }}"
        tag_name: ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
        overwrite_files: false
        files: ${{ steps.assets.outputs.files }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
