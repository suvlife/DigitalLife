[mypy]
python_version = 3.11
show_error_codes = True
pretty = True
ignore_missing_imports = True
no_strict_optional = False
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_incomplete_defs = True
disallow_any_generics = False
disallow_any_explicit = False
check_untyped_defs = True
allow_untyped_globals = True
strict_equality = True
mypy_path = src
files = src, tui
exclude = ^(tests/|frontend/)
explicit_package_bases = True

[mypy-dashscope.*]
ignore_missing_imports = True

[mypy-textual.*]
ignore_missing_imports = True

[mypy-claude_agent_sdk.*]
ignore_missing_imports = True

[mypy-peewee_async.*]
ignore_missing_imports = True

[mypy-model.dbModel.*]
disable_error_code = assignment, arg-type

[mypy-dal.db.gtRoomMessageManager]
disable_error_code = attr-defined

[mypy-dal.db.gtAgentHistoryManager]
disable_error_code = attr-defined

[mypy-dal.db.gtAgentTaskManager]
disable_error_code = attr-defined

[mypy-dal.db.gtAgentActivityManager]
disable_error_code = attr-defined

[mypy-dal.db.gtAgentManager]
disable_error_code = arg-type

[mypy-util.jsonUtil]
disable_error_code = assignment

[mypy-service.messageBus]
disable_error_code = arg-type

[mypy-service.ormService]
disable_error_code = method-assign

[mypy-service.agentActivityService]
disable_error_code = arg-type

[mypy-service.agentService.driver.claudeSdkDriver]
disable_error_code = assignment

[mypy-service.schedulerService]
disable_error_code = arg-type

[mypy-controller.roomController]
disable_error_code = arg-type

[mypy-route]
disable_error_code = attr-defined

[mypy-app_entry]
disable_error_code = var-annotated
